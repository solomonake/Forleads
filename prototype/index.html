<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Forleads — Living-Map Prototype</title>
<link href="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
:root{
  --bg:#0A0E14;--surface:#121822;--surface-2:#1A2230;--elevated:#222C3D;
  --hairline:#26334A;--hairline-strong:#33425C;
  --text:#E8EDF4;--text-2:#9AA7B8;--text-muted:#5E6B7E;
  --brand:#7C8CFF;--brand-press:#5D6DF0;
  --signal:#2DE0C8;--signal-soft:rgba(45,224,200,.14);
  --grade-a:#38D39F;--grade-b:#6E8BFF;--grade-c:#F4B740;--grade-d:#8A94A6;
  --danger:#FF6B6B;--ok:#38D39F;
  --r-sm:8px;--r-md:12px;--r-lg:18px;--r-pill:999px;
  --shadow-2:0 8px 30px rgba(0,0,0,.45);
  --ease-fly:cubic-bezier(.22,.61,.36,1);--ease-card:cubic-bezier(.16,1,.3,1);
  --mono:ui-monospace,"JetBrains Mono","SF Mono",Menlo,monospace;
  --sans:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden}
#map{position:absolute;inset:0}
.maplibregl-ctrl-attrib{font-size:10px!important;background:rgba(10,14,20,.6)!important}
.maplibregl-ctrl-attrib a{color:var(--text-muted)!important}

/* ---- Command bar ---- */
#cmd{position:absolute;top:18px;left:50%;transform:translateX(-50%);z-index:30;width:min(560px,calc(100% - 32px));}
#cmd .pill{display:flex;align-items:center;gap:10px;height:54px;padding:0 18px;border-radius:var(--r-pill);
  background:rgba(18,24,34,.82);backdrop-filter:blur(18px);border:1px solid var(--hairline);box-shadow:var(--shadow-2)}
#cmd .logo{font-weight:700;letter-spacing:-.02em;color:var(--text);font-size:15px;white-space:nowrap}
#cmd .logo b{color:var(--signal)}
#cmd input{flex:1;background:transparent;border:0;outline:0;color:var(--text);font-size:15px}
#cmd input::placeholder{color:var(--text-muted)}
#cmd .kbd{font-family:var(--mono);font-size:11px;color:var(--text-muted);border:1px solid var(--hairline);border-radius:6px;padding:2px 6px}
#suggest{margin-top:8px;background:rgba(18,24,34,.95);backdrop-filter:blur(18px);border:1px solid var(--hairline);
  border-radius:var(--r-md);overflow:hidden;box-shadow:var(--shadow-2);display:none}
#suggest.open{display:block}
.sug{display:flex;align-items:center;gap:12px;padding:11px 16px;cursor:pointer;border-bottom:1px solid var(--hairline)}
.sug:last-child{border-bottom:0}
.sug:hover,.sug.active{background:var(--signal-soft)}
.sug .ico{width:26px;height:26px;border-radius:7px;background:var(--surface-2);display:grid;place-items:center;color:var(--signal);font-size:13px;flex-shrink:0}
.sug .t{font-size:14px}.sug .s{font-size:12px;color:var(--text-2)}

/* ---- Tools rail (desktop) ---- */
#tools{position:absolute;left:16px;top:50%;transform:translateY(-50%);z-index:20;display:flex;flex-direction:column;gap:8px}
.tool{width:46px;height:46px;border-radius:12px;background:rgba(18,24,34,.82);backdrop-filter:blur(14px);
  border:1px solid var(--hairline);color:var(--text-2);display:grid;place-items:center;cursor:pointer;font-size:17px}
.tool:hover{color:var(--signal);border-color:var(--hairline-strong)}
.tool.on{color:var(--bg);background:var(--signal);border-color:var(--signal)}

/* ---- Lead rail / sheet ---- */
#lead{position:absolute;z-index:25;top:84px;right:16px;width:404px;max-height:calc(100% - 120px);
  background:rgba(16,22,32,.86);backdrop-filter:blur(20px);border:1px solid var(--hairline);border-radius:var(--r-lg);
  box-shadow:var(--shadow-2);display:flex;flex-direction:column;transform:translateX(460px);opacity:0;
  transition:transform .5s var(--ease-fly),opacity .4s ease;overflow:hidden}
#lead.open{transform:translateX(0);opacity:1}
.lead-head{padding:18px 20px 14px;border-bottom:1px solid var(--hairline)}
.lead-addr{font-size:24px;font-weight:600;letter-spacing:-.01em;line-height:1.15}
.lead-sub{display:flex;align-items:center;gap:10px;margin-top:8px;font-size:13px;color:var(--text-2)}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--signal);box-shadow:0 0 8px var(--signal)}
.grade-overall{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--text-2)}
.lead-body{overflow-y:auto;padding:8px 14px 14px}
.scout-group-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin:14px 6px 8px}

/* ---- Evidence card ---- */
.card{background:var(--surface-2);border:1px solid var(--hairline);border-left:2px solid var(--signal);
  border-radius:var(--r-md);padding:13px 14px;margin:8px 0;opacity:0;transform:translateY(10px);
  animation:cardIn .42s var(--ease-card) forwards}
@keyframes cardIn{to{opacity:1;transform:translateY(0)}}
.card .claim{font-size:13.5px;color:var(--text)}
.card .val{font-family:var(--mono);font-size:14px;color:var(--text);font-weight:500}
.card .row1{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.card .meta{display:flex;align-items:center;gap:8px;margin-top:9px;font-size:11.5px;color:var(--text-2)}
.card .src{color:var(--text-muted)}
.card .src a{color:var(--text-2);text-decoration:none;border-bottom:1px dotted var(--text-muted)}
.chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;font-weight:600;
  padding:2px 8px;border-radius:var(--r-pill);border:1px solid var(--hairline)}
.chip .d{width:7px;height:7px;border-radius:50%}
.gA{color:var(--grade-a)} .gA .d{background:var(--grade-a)}
.gB{color:var(--grade-b)} .gB .d{background:var(--grade-b)}
.gC{color:var(--grade-c)} .gC .d{background:var(--grade-c)}
.gD{color:var(--grade-d)} .gD .d{background:var(--grade-d)}
.gap-note{font-size:12px;color:var(--grade-c);margin-top:7px;font-style:italic}

/* ---- Note composer + actions ---- */
.lead-foot{border-top:1px solid var(--hairline);padding:14px;background:rgba(10,14,20,.4)}
.note-box{display:flex;gap:8px;align-items:flex-end;background:var(--surface-2);border:1px solid var(--hairline);
  border-radius:var(--r-md);padding:8px 10px}
.note-box textarea{flex:1;background:transparent;border:0;outline:0;color:var(--text);font-family:var(--sans);
  font-size:13.5px;resize:none;height:38px;line-height:1.4}
.mic{width:34px;height:34px;border-radius:9px;background:var(--surface);border:1px solid var(--hairline);color:var(--signal);cursor:pointer;flex-shrink:0}
.quick{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
.quick button{font-size:12px;color:var(--text-2);background:var(--surface-2);border:1px solid var(--hairline);
  border-radius:var(--r-pill);padding:6px 12px;cursor:pointer}
.quick button:hover{color:var(--signal);border-color:var(--hairline-strong)}

/* thinking chip */
.thinking{display:none;align-items:center;gap:9px;margin-top:11px;font-size:13px;color:var(--signal)}
.thinking.show{display:flex}
.thinking .orb{width:14px;height:14px;border-radius:50%;background:var(--signal);box-shadow:0 0 10px var(--signal);animation:breathe 1.1s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(.7);opacity:.6}50%{transform:scale(1);opacity:1}}

/* suggestion box */
.nba{margin-top:11px;background:var(--surface-2);border:1px solid var(--hairline-strong);border-radius:var(--r-md);padding:13px;display:none}
.nba.show{display:block;animation:cardIn .4s var(--ease-card)}
.nba .h{font-size:12px;color:var(--text-2);margin-bottom:4px}
.nba .situ{font-size:14px;font-weight:600;color:var(--text);margin-bottom:10px}
.nba .opt{display:flex;align-items:center;gap:9px;padding:8px;border-radius:8px;cursor:pointer;font-size:13px}
.nba .opt:hover{background:var(--signal-soft)}
.nba .opt .r{width:15px;height:15px;border-radius:50%;border:2px solid var(--brand);flex-shrink:0}
.nba .opt.sel .r{background:var(--brand);box-shadow:inset 0 0 0 3px var(--surface-2)}
.nba .draftbtn{width:100%;margin-top:10px;height:40px;border:0;border-radius:10px;background:var(--brand);color:#fff;font-weight:600;font-size:14px;cursor:pointer}
.nba .draftbtn:hover{background:var(--brand-press)}

/* ---- Review tray (draft email) ---- */
#tray{position:absolute;inset:0;z-index:50;background:rgba(6,9,14,.66);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px}
#tray.open{display:flex}
.draft{width:min(560px,100%);max-height:90vh;overflow-y:auto;background:var(--surface);border:1px solid var(--hairline-strong);border-radius:var(--r-lg);box-shadow:var(--shadow-2)}
.draft-head{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--hairline)}
.draft-head .t{font-weight:600;font-size:15px}
.draft-head .t small{color:var(--text-2);font-weight:400}
.compliance{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ok);font-weight:600}
.draft-body{padding:18px 20px}
.field{display:flex;gap:10px;font-size:13.5px;padding:8px 0;border-bottom:1px solid var(--hairline)}
.field .k{color:var(--text-muted);width:64px;flex-shrink:0;font-size:12px;padding-top:2px}
.field .v{color:var(--text)}
.email-body{margin-top:14px;font-size:14px;line-height:1.6;color:var(--text);white-space:pre-wrap}
.evidence-used{margin-top:14px;padding:11px;background:var(--surface-2);border-radius:10px;font-size:12px;color:var(--text-2)}
.evidence-used .chip{margin-right:6px}
.draft-foot{display:flex;gap:10px;padding:16px 20px;border-top:1px solid var(--hairline)}
.btn{flex:1;height:44px;border-radius:11px;border:1px solid var(--hairline);background:var(--surface-2);color:var(--text);font-weight:600;font-size:14px;cursor:pointer}
.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff;flex:2}
.btn.primary:hover{background:var(--brand-press)}
.btn:hover{border-color:var(--hairline-strong)}

/* sent toast */
#toast{position:absolute;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);z-index:60;
  background:var(--ok);color:#04130d;font-weight:700;padding:13px 22px;border-radius:var(--r-pill);
  box-shadow:var(--shadow-2);opacity:0;transition:.4s var(--ease-fly);display:flex;align-items:center;gap:8px}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* beacon marker */
.beacon{width:20px;height:20px}
.beacon .core{position:absolute;inset:0;margin:auto;width:11px;height:11px;border-radius:50%;background:var(--signal);box-shadow:0 0 12px var(--signal)}
.beacon .ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--signal);animation:pulse 1.8s ease-out infinite}
@keyframes pulse{0%{transform:scale(.4);opacity:.9}100%{transform:scale(3.4);opacity:0}}

/* hint */
#hint{position:absolute;bottom:24px;left:24px;z-index:15;font-size:12.5px;color:var(--text-muted);max-width:280px;line-height:1.5}
#hint b{color:var(--text-2)}
.demoflag{position:absolute;top:84px;left:50%;transform:translateX(-50%);z-index:14;font-size:11px;color:var(--text-muted);
  background:rgba(18,24,34,.7);border:1px solid var(--hairline);padding:4px 12px;border-radius:var(--r-pill)}

@media (max-width:720px){
  #tools{display:none}
  #lead{top:auto;bottom:0;right:0;left:0;width:100%;max-height:74%;border-radius:18px 18px 0 0;
    transform:translateY(100%)}
  #lead.open{transform:translateY(0)}
  .lead-addr{font-size:20px}
  #hint{display:none}
}
@media (prefers-reduced-motion:reduce){
  .card{animation-duration:.01ms}.beacon .ring{animation:none}
}
</style>
</head>
<body>
<div id="map"></div>

<div class="demoflag">◆ Prototype · demo data · real map</div>

<div id="cmd">
  <div class="pill">
    <span class="logo">For<b>leads</b></span>
    <input id="search" placeholder="Search an address, anywhere on Earth…" autocomplete="off" />
    <span class="kbd">⌘K</span>
  </div>
  <div id="suggest"></div>
</div>

<div id="tools">
  <div class="tool" id="t-sat" title="Aerial toggle">🛰</div>
  <div class="tool" title="Recenter" id="t-center">⌖</div>
  <div class="tool" title="Watchers">❤</div>
  <div class="tool" title="Grade legend" id="t-legend">⬢</div>
</div>

<div id="lead">
  <div class="lead-head">
    <div class="lead-addr" id="la">—</div>
    <div class="lead-sub"><span class="status-dot"></span><span id="lstatus">Researching</span>
      <span class="grade-overall" id="loverall"></span></div>
  </div>
  <div class="lead-body" id="lbody"></div>
  <div class="lead-foot">
    <div class="note-box">
      <textarea id="note" placeholder="Add a note… e.g. ‘knocked, no answer, nice yard’"></textarea>
      <button class="mic" title="Voice note">🎤</button>
    </div>
    <div class="quick">
      <button data-note="Knocked, no answer. Nice yard, well kept.">Knocked, no answer</button>
      <button data-note="Owner home — said the house feels too big since the kids moved out.">Interested seller</button>
      <button data-note="Seller worried it's the wrong time to sell.">Objection: timing</button>
    </div>
    <div class="thinking" id="thinking"><span class="orb"></span><span id="thinkmsg">Reading your note…</span></div>
    <div class="nba" id="nba"></div>
  </div>
</div>

<div id="tray"><div class="draft" id="draft"></div></div>
<div id="toast">✓ <span>Sent — logged to this lead’s memory</span></div>

<div id="hint">Tap a suggested address (or your own street) → watch it <b>fly in</b> while <b>scouts</b> ground the facts. Then click <b>“Knocked, no answer”</b> to see a draft write itself.</div>

<script>
/* ============ DEMO DATA (global, to feel "day-one global") ============ */
const PLACES = [
  {t:"12 Oak Street",s:"San Francisco, USA",c:[-122.4469,37.7694]},
  {t:"221B Baker Street",s:"London, UK",c:[-0.1574,51.5237]},
  {t:"Karen Road",s:"Nairobi, Kenya",c:[36.7073,-1.3318]},
  {t:"Shibuya 2-chome",s:"Tokyo, Japan",c:[139.7005,35.6595]},
  {t:"Rua Barata Ribeiro",s:"Rio de Janeiro, Brazil",c:[-43.1860,-22.9690]},
  {t:"Connaught Place",s:"New Delhi, India",c:[77.2167,28.6315]},
  {t:"Plaka",s:"Athens, Greece",c:[23.7290,37.9715]},
  {t:"Bondi Beach Rd",s:"Sydney, Australia",c:[151.2744,-33.8908]}
];
// realistic, GRADED, CITED mock evidence (no naked numbers, ever)
function evidenceFor(p){
  const yr = 1890+Math.floor(Math.random()*120);
  const m2 = 90+Math.floor(Math.random()*180);
  return {
    property:[
      {claim:"Year built",val:"~"+yr,grade:"A",src:["OpenStreetMap"],delay:300},
      {claim:"Building footprint",val:"~"+m2+" m²",grade:"B",src:["OSM polygon"],delay:1500},
      {claim:"Land use",val:"Residential",grade:"A",src:["OSM"],delay:2100}
    ],
    imagery:[
      {claim:"Street imagery",val:"3 frames",grade:"A",src:["Mapillary","CC-BY-SA"],delay:900},
      {claim:"Condition (vision)",val:"Single-story · pitched roof · mature garden",grade:"C",src:["Imagery Scout · 1 image"],delay:2600,gap:"Low confidence — inferred from a single frame."}
    ],
    people:[
      {claim:"Occupancy",val:"Likely owner-occupied",grade:"C",src:["public records"],delay:3000,gap:"Lawful public signals only — never demographics."}
    ],
    market:[
      {claim:"Resale estimate",val:null,grade:"D",src:[],delay:3600,gap:"No recent comps for this market in the free tier. Connect a local data source to upgrade."}
    ],
    risk:[
      {claim:"Flood risk",val:"Low",grade:"B",src:["open hazard layer"],delay:2400}
    ]
  };
}
const GROUPS=[["property","Property"],["imagery","Imagery"],["people","People"],["market","Market"],["risk","Risk"]];

/* ============ MAP (dark cartographic luxe, no API key) ============ */
const map = new maplibregl.Map({
  container:'map', center:[10,30], zoom:2.2, pitch:0, attributionControl:{compact:true},
  style:{version:8,
    sources:{
      carto:{type:'raster',tileSize:256,
        tiles:['https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png',
               'https://b.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png',
               'https://c.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'],
        attribution:'© OpenStreetMap · © CARTO · Imagery © Esri · Street © Mapillary (CC-BY-SA)'},
      sat:{type:'raster',tileSize:256,
        tiles:['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
        attribution:'Imagery © Esri'}
    },
    layers:[{id:'carto',type:'raster',source:'carto'},
            {id:'sat',type:'raster',source:'sat',layout:{visibility:'none'}}]
  }
});

let beacon=null, currentPlace=null;
function makeBeacon(c){
  if(beacon) beacon.remove();
  const el=document.createElement('div'); el.className='beacon';
  el.innerHTML='<div class="ring"></div><div class="core"></div>';
  beacon=new maplibregl.Marker({element:el}).setLngLat(c).addTo(map);
}
function stopBeacon(){ if(beacon){const r=beacon.getElement().querySelector('.ring'); if(r) r.style.display='none';} }

/* ============ THE MAGIC LOOP ============ */
function goTo(p){
  currentPlace=p;
  closeSuggest(); document.getElementById('search').value=p.t;
  // 1) fly-to IS the loading window
  map.flyTo({center:p.c,zoom:16.4,pitch:45,bearing:-17,duration:1800,essential:true,easing:t=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2});
  makeBeacon(p.c);
  // 2) open the lead rail, reset
  const lead=document.getElementById('lead'); lead.classList.add('open');
  document.getElementById('la').textContent=p.t;
  document.getElementById('lstatus').textContent='Researching';
  document.getElementById('loverall').textContent='';
  document.getElementById('nba').classList.remove('show');
  document.getElementById('note').value='';
  const body=document.getElementById('lbody'); body.innerHTML='';
  // 3) stream scouts (each card cited + graded; timings = "real work")
  const ev=evidenceFor(p); let total=0,settled=0;
  GROUPS.forEach(([key,label])=>{
    const cards=ev[key]; if(!cards||!cards.length) return;
    const gl=document.createElement('div'); gl.className='scout-group-label'; gl.textContent=label; gl.style.opacity=0;
    body.appendChild(gl);
    cards.forEach(card=>{
      total++;
      setTimeout(()=>{ gl.style.opacity=1; body.appendChild(renderCard(card));
        settled++; if(settled===total) finishReduce(ev); },card.delay);
    });
  });
  setTimeout(stopBeacon,3900);
}
function renderCard(card){
  const g={A:'gA',B:'gB',C:'gC',D:'gD'}[card.grade];
  const val = card.val===null ? '<span class="val" style="color:var(--grade-d)">unverified</span>'
                              : '<span class="val">'+card.val+'</span>';
  const src = card.src.length ? '<span class="src">© '+card.src.join(' · ')+'</span>' : '<span class="src">no source</span>';
  const gap = card.gap ? '<div class="gap-note">'+card.gap+'</div>' : '';
  const el=document.createElement('div'); el.className='card';
  if(card.grade==='D') el.style.borderLeftColor='var(--grade-d)';
  el.innerHTML='<div class="row1"><span class="claim">'+card.claim+'</span>'+val+'</div>'+
    '<div class="meta"><span class="chip '+g+'"><span class="d"></span>'+card.grade+'</span>'+src+'</div>'+gap;
  return el;
}
function finishReduce(ev){
  document.getElementById('lstatus').textContent='Grounded';
  document.getElementById('loverall').textContent='overall grade B · 5 scouts';
}

/* ============ NOTE → NEXT-BEST-ACTION → DRAFT ============ */
const NBA={
  no_contact:{situ:"No contact",opts:["Warm follow-up letter  (recommended)","Retry-knock task in 4 days","Add to 6-month nurture"]},
  interested_seller:{situ:"Interested seller · downsizing",opts:["Empathetic ‘your options’ letter  (recommended)","Prep a comparative market packet","Request an appointment + calendar hold"]},
  objection_timing:{situ:"Objection · timing",opts:["Tailored timing-objection reply  (recommended)","Share market-timing one-pager","Enrol in no-drop follow-up cadence"]}
};
function classify(text){
  const t=text.toLowerCase();
  if(/no answer|knock|nobody|no one/.test(t)) return 'no_contact';
  if(/too big|downsize|kids|selling|interested/.test(t)) return 'interested_seller';
  if(/wrong time|timing|not sure|wait/.test(t)) return 'objection_timing';
  return 'no_contact';
}
function submitNote(text){
  if(!text.trim()) return;
  document.getElementById('note').value=text;
  const th=document.getElementById('thinking'); th.classList.add('show');
  document.getElementById('thinkmsg').textContent='Reading your note…';
  document.getElementById('nba').classList.remove('show');
  setTimeout(()=>document.getElementById('thinkmsg').textContent='Classifying the situation…',650);
  setTimeout(()=>document.getElementById('thinkmsg').textContent='Choosing the next best action…',1300);
  setTimeout(()=>{ th.classList.remove('show'); showNBA(classify(text)); },1950);
}
function showNBA(key){
  const d=NBA[key], box=document.getElementById('nba');
  box.dataset.key=key;
  box.innerHTML='<div class="h">Situation</div><div class="situ">'+d.situ+'</div>'+
    d.opts.map((o,i)=>'<div class="opt '+(i===0?'sel':'')+'" data-i="'+i+'"><span class="r"></span>'+o+'</div>').join('')+
    '<button class="draftbtn">Draft it →</button>';
  box.classList.add('show');
  box.querySelectorAll('.opt').forEach(o=>o.onclick=()=>{box.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));o.classList.add('sel')});
  box.querySelector('.draftbtn').onclick=()=>openDraft(key);
}

/* draft email content per situation */
function draftContent(key){
  const name="Marcus Lee", addr=currentPlace?currentPlace.t:"your home";
  const M={
   no_contact:{subj:"A quick note about your home on "+addr,
     body:"Hi there,\n\nI stopped by "+addr+" today and was struck by how well-kept your home is — that garden clearly gets a lot of love.\n\nI work this neighborhood closely, and if you’ve ever wondered what your home could be worth in today’s market, I’d be glad to put together an honest, no-pressure picture for you.\n\nWarmly,\nMarcus",
     ev:["Year built (A)","Neighborhood (A)"]},
   interested_seller:{subj:"Options for your home on "+addr+" — no pressure",
     body:"Hi there,\n\nIt was lovely chatting today. You mentioned the home feels a little big now — that’s such a common (and freeing) realization.\n\nThere are some smaller, single-story homes nearby that might suit this next chapter, and I can show you what your current home could enable. Whenever you’re ready, no rush at all.\n\nWarmly,\nMarcus",
     ev:["Land use (A)","Nearby comps (C)"]},
   objection_timing:{subj:"Is it the right time? Let’s look at the facts",
     body:"Hi there,\n\nTotally fair to wonder about timing — it’s the question I get most.\n\nRather than guess, I’d love to walk you through what’s actually happening on your street so the decision is yours and well-informed. No pressure either way.\n\nWarmly,\nMarcus",
     ev:["Flood risk (B)","Land use (A)"]}
  };
  return M[key];
}
function openDraft(key){
  const c=draftContent(key);
  const chips=c.ev.map(e=>{const g=e.includes('(A)')?'gA':e.includes('(B)')?'gB':e.includes('(C)')?'gC':'gD';
    return '<span class="chip '+g+'"><span class="d"></span>'+e+'</span>';}).join('');
  document.getElementById('draft').innerHTML=
   '<div class="draft-head"><span style="color:var(--brand);font-size:18px">✉</span>'+
   '<div class="t">Draft <small>· ready for your review</small></div>'+
   '<div class="compliance">✓ Fair-housing checked</div></div>'+
   '<div class="draft-body">'+
     '<div class="field"><span class="k">From</span><span class="v">Marcus Lee &lt;marcus@forleads.app&gt;</span></div>'+
     '<div class="field"><span class="k">To</span><span class="v">Owner · '+(currentPlace?currentPlace.t:'')+'</span></div>'+
     '<div class="field"><span class="k">Subject</span><span class="v">'+c.subj+'</span></div>'+
     '<div class="email-body">'+c.body+'</div>'+
     '<div class="evidence-used"><b style="color:var(--text-2)">Evidence used:</b><br><br>'+chips+'</div>'+
   '</div>'+
   '<div class="draft-foot"><button class="btn" id="discard">Discard</button>'+
     '<button class="btn" id="edit">Edit</button>'+
     '<button class="btn primary" id="approve">Approve &amp; Send</button></div>';
  document.getElementById('tray').classList.add('open');
  document.getElementById('approve').onclick=()=>{ closeTray(); toast();
     document.getElementById('lstatus').textContent='Contacted'; };
  document.getElementById('edit').onclick=()=>alert('In the real app this opens an inline editor with the body editable. (Prototype)');
  document.getElementById('discard').onclick=closeTray;
}
function closeTray(){document.getElementById('tray').classList.remove('open')}
function toast(){const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600)}

/* ============ SEARCH / AUTOCOMPLETE ============ */
const search=document.getElementById('search'), sug=document.getElementById('suggest');
function renderSuggest(q){
  const list=PLACES.filter(p=>(p.t+' '+p.s).toLowerCase().includes(q.toLowerCase())).slice(0,6);
  if(!list.length||!q){closeSuggest();return;}
  sug.innerHTML=list.map((p,i)=>'<div class="sug'+(i===0?' active':'')+'" data-t="'+p.t+'"><span class="ico">⌖</span>'+
    '<div><div class="t">'+p.t+'</div><div class="s">'+p.s+'</div></div></div>').join('');
  sug.classList.add('open');
  sug.querySelectorAll('.sug').forEach(el=>el.onclick=()=>{const p=PLACES.find(x=>x.t===el.dataset.t); goTo(p);});
}
function closeSuggest(){sug.classList.remove('open')}
search.addEventListener('input',e=>renderSuggest(e.target.value));
search.addEventListener('focus',()=>{if(!search.value)renderSuggest('')});
search.addEventListener('keydown',e=>{ if(e.key==='Enter'){const first=PLACES.find(p=>(p.t+' '+p.s).toLowerCase().includes(search.value.toLowerCase()))||PLACES[0]; goTo(first);} if(e.key==='Escape')closeSuggest(); });
document.addEventListener('keydown',e=>{ if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();search.focus();renderSuggest('');} });

/* quick-note buttons + textarea enter */
document.querySelectorAll('.quick button').forEach(b=>b.onclick=()=>submitNote(b.dataset.note));
document.getElementById('note').addEventListener('keydown',e=>{ if((e.metaKey||e.ctrlKey)&&e.key==='Enter')submitNote(e.target.value); });
document.querySelector('.mic').onclick=()=>submitNote("Knocked, no answer. Nice yard, well kept.");

/* tools */
let sat=false;
document.getElementById('t-sat').onclick=function(){ sat=!sat; this.classList.toggle('on',sat);
  map.setLayoutProperty('sat','visibility',sat?'visible':'none'); };
document.getElementById('t-center').onclick=()=>{ if(currentPlace) map.flyTo({center:currentPlace.c,zoom:16.4,pitch:45,duration:1200}); };
document.getElementById('t-legend').onclick=()=>alert('Confidence grades:\n\nA — official record / recent verified\nB — modeled from ≥3 signals\nC — sparse / single weak signal\nD — insufficient (we say so)\n\nNo value is ever shown without a source + grade.');

/* open first suggestion shortly after load so the magic is obvious */
map.on('load',()=>{ setTimeout(()=>renderSuggest(''),400); });
</script>
