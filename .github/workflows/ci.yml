# CI runs deterministic product and agent-system proof on every change.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main] # PRs cover main; this checks feature branches early

jobs:
  gates:
    name: agent proof
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # .npmrc pins legacy-peer-deps (React 18 peers); npm ci respects it.
      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run agent:doctor

      - name: Static and unit gates
        run: npm run typecheck && npm run lint && npm test

      - name: Coverage and agent evaluations
        run: npm run test:coverage && npm run agent:eval

      - name: Dependency security
        run: npm audit --audit-level=high

      - name: Secret pattern scan
        run: |
          if git grep -nE '(sk_live_|AKIA[0-9A-Z]{16}|-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----)' -- ':!package-lock.json'; then
            echo "Potential committed secret detected"
            exit 1
          fi

      - name: Production build
        run: npm run build

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Product flows and accessibility smoke
        run: npm run demo:e2e

      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: agent-proof-${{ github.sha }}
          path: |
            coverage/**
            .playwright/**
            test-results/**
          if-no-files-found: ignore
